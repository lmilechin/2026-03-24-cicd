name: My CI Workflow

on: 
    push

jobs: 
    hello: 
        name: My Hello Job
        runs-on: ubuntu-latest
        steps: 
            - name: Print Hello World
              run: echo "Hello World"
            - name: Second step
              run: echo "second"

    goodbye: 
        name: My Goodbye Job
        needs: hello
        runs-on: windows-latest
        steps: 
            - run: echo "Goodbye"