name: My CI Workflow

on: 
    push: 
        branches: [main]
    pull_request: 
    workflow_dispatch:

jobs: 
    hello: 
        name: My Hello Job
        runs-on: ubuntu-latest
        steps: 
            - name: Print Hello World
              run: echo "Hello World"
            - name: Second step
              run: echo "second"

    goodbye: 
        name: My Goodbye Job
        needs: hello
        runs-on: windows-latest
        steps: 
            - run: echo "Goodbye"
    
    test: 
        name: Test the Python Package
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout the Repo
              uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v6
              with: 
                python-version: "3.10"
            - name: Install the Package
              run: pip install .[test]
            - name: Run the Tests
              run: pytest -vv